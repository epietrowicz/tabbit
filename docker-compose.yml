services:
  api:
    build:
      context: ./server
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      DATABASE_PATH: /data/app.db
    volumes:
      - sqlite-data:/data
    restart: unless-stopped

  web:
    build:
      context: ./ui
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  sqlite-data:
